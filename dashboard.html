<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <!-- Popper JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>

    <!-- Latest compiled JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

    <!--D3 library-->
    <script src="https://d3js.org/d3.v5.min.js"></script>

    <!--Chartjs-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.8.0"></script>

    <!--Font-aweseome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <link rel="stylesheet" href="src/css/styles.css">
    <link rel="icon" href="src/assets/img/favicon_io/apple-touch-icon.png">

    <title>Dashboard</title>
</head>

<body>
    <div class="container">
        <h1 class="display-4"><a class="text-danger" href="index.html">RedHanded</a> <span class="forward">/</span> <a
                href="map.html">Map</a> <span class="forward">/</span>
            Dashboard</h1>
        <div class="card">
            <div class="card-header">
                <i class="fa fa-area-chart"></i> Philadelphia Crime Area Chart
            </div>
            <div class="card-body">
                <canvas id="crimeOverYear"></canvas>
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        <i class="fa fa-bar-chart"></i> Number of Crimes per Month (2019)
                    </div>
                    <div class="card-body">
                        <canvas id="bargraph"></canvas>
                    </div>
                </div>
                <br>
            </div>
            

            <div class="col">
                <div class="card">
                    <div class="card-header">
                        <i class="fa fa-bar-chart"></i> Crime during the Day
                    </div>
                    <canvas id="day" class="card-body">
                    </canvas>
                </div>
            </div>
        </div>
        <br>
        <div class="card">
            <div class="card-header">
                <i class="fa fa-bar-chart"></i> Types of Crimes (2019)
            </div>
            <div class="card-body">
                <canvas id="pie"></canvas>
            </div>
        </div>
        <br>
        <div class="card">
            <div class="card-header">
                <i class="fa fa-bar-chart"></i> Total Crimes by Zipcode (2019)
            </div>
            <canvas id="zipcode" class="card-body"></canvas>
        </div>

        <br>
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        <i class="fa fa-bar-chart"></i> Household Income (2019)
                    </div>
                    <canvas id="income" class="card-body">
                    </canvas>
                </div>
            </div>
            <br>
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        <i class="fa fa-bar-chart"></i> Population Density (2019)
                    </div>
                    <canvas id="density" class="card-body">
                    </canvas>
                </div>
            </div>
        </div>
        <br>


    </div>
    <script src="src/js/dashboard.js"></script>
</body>

</html>
